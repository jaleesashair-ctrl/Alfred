<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alfred — At Your Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0e1419;
      --border: #1e2a35;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --text: #d4cfc7;
      --text-dim: #6b7280;
      --user-bg: #0f1f2e;
      --alfred-bg: #0e1419;
      --input-bg: #0b1016;
      --glow: rgba(201,168,76,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .crest {
      width: 42px;
      height: 42px;
      border: 1px solid var(--gold-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: var(--gold);
      background: radial-gradient(circle at center, rgba(201,168,76,0.06), transparent);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2e9e5b;
      box-shadow: 0 0 6px #2e9e5b;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* greeting */
    .greeting {
      text-align: center;
      padding: 32px 0 12px;
    }

    .greeting .g-crest {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      color: var(--gold);
      opacity: 0.15;
      line-height: 1;
      margin-bottom: 12px;
    }

    .greeting h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--gold);
      font-style: italic;
      margin-bottom: 6px;
    }

    .greeting p {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 340px;
      margin: 0 auto;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      background: transparent;
    }

    .suggestion:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    /* message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      gap: 4px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.alfred { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 4px;
    }

    .msg.alfred .msg-label { color: var(--gold-dim); }

    .bubble {
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #1a2d40;
      border-radius: 4px 4px 0 4px;
      color: var(--text);
    }

    .msg.alfred .bubble {
      background: var(--alfred-bg);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold-dim);
      border-radius: 0 4px 4px 4px;
      color: var(--text);
    }

    /* code blocks inside alfred messages */
    .bubble code {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      background: #060a0d;
      padding: 2px 5px;
      border-radius: 3px;
      color: #7dd3fc;
    }

    .bubble pre {
      background: #060a0d;
      border: 1px solid #1a2535;
      border-radius: 4px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    /* typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Input ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 28px 20px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #userInput:focus { border-color: var(--gold-dim); }
    #userInput::placeholder { color: var(--text-dim); }

    #sendBtn {
      width: 44px;
      height: 44px;
      background: var(--gold);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #sendBtn:hover { background: #d4b05a; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { background: var(--gold-dim); cursor: not-allowed; }

    #sendBtn svg { width: 18px; height: 18px; fill: #080c10; }

    .input-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* ── Divider ── */
    .day-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .day-divider::before, .day-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="crest">A</div>
    <div class="header-text">
      <h1>Alfred</h1>
      <p>Personal AI Butler &amp; Coding Assistant</p>
    </div>
    <div class="status-dot">Online</div>
  </header>

  <div id="messages">
    <div class="greeting">
      <div class="g-crest">A</div>
      <h2>Good evening, sir.</h2>
      <p>I am Alfred, at your service. Ask me anything — code, games, websites, or otherwise.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="suggest(this)">Help me debug my code</button>
        <button class="suggestion" onclick="suggest(this)">Build a 2D game in Python</button>
        <button class="suggestion" onclick="suggest(this)">Create a website for me</button>
        <button class="suggestion" onclick="suggest(this)">Explain how APIs work</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="How may I assist you, sir?" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
  const WEBHOOK = 'https://jarvis2012-my-247-n8n.hf.space/webhook/68eecb12-581b-4b80-82df-eb5bf02d63cb/chat';
const WEBHOOK = 'https://jarvis2012-my-247-n8n.hf.space/webhook/68eecb12-581b-4b80-82df-eb5bf02d63cb/chat';
const ELEVENLABS_KEY = ' sk_e082ca34a003e2e34807d7e2e20eb72eaa8396ba082fd9e3
';
const VOICE_ID = 'JBFqnCBsd6RMkjVDRZzb';
  const sessionId = 'session-' + Math.random().toString(36).slice(2);

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function suggest(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Alfred';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'alfred') {
      bubble.innerHTML = formatText(text);
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg alfred typing';
    wrap.innerHTML = '<div class="msg-label">Alfred</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function formatText(text) {
    // code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escHtml(code.trim())}</code></pre>`
    );
    // inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    // bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // newlines
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // remove greeting on first message
    const greeting = messagesEl.querySelector('.greeting');
    if (greeting) greeting.remove();

    addMessage('user', text);
    const typingEl = addTyping();

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatInput: text, sessionId })
      });

      const data = await res.json();
      typingEl.remove();

      const reply = data.output || data.text || data.message || data.response ||
                    (Array.isArray(data) && (data[0]?.output || data[0]?.text)) ||
                    'Forgive me, sir — I seem to have lost my train of thought.';

      addMessage('alfred', reply);
    } catch (err) {
      typingEl.remove();
      addMessage('alfred', 'My sincerest apologies, sir. I appear to be experiencing a momentary lapse in connectivity. Please do try again.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
